<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alaska Cruise Countdown</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:transparent;
}

/* 3X BIGGER */
#countdown-box {
  position:fixed;
  top:30px;
  right:30px;

  width:520px;
  padding:28px;

  text-align:center;

  background:linear-gradient(135deg,#0f4c5c,#1f1f1f);
  border:4px solid #2dd4bf;
  border-radius:20px;

  color:white;

  box-shadow:0 0 25px rgba(45,212,191,0.5);

  animation:tealPulse 2s infinite;
}

@keyframes tealPulse {
  0% { box-shadow:0 0 12px rgba(45,212,191,0.3);}
  50% { box-shadow:0 0 45px rgba(45,212,191,0.9);}
  100% { box-shadow:0 0 12px rgba(45,212,191,0.3);}
}

#title {
  font-size:26px;
  font-weight:bold;
  text-transform:uppercase;
}

#timer {
  font-size:44px;
  font-weight:bold;
  margin:12px 0;
}

#subtext {
  font-size:16px;
  color:#cbd5e1;
}

/* LOGO */
#logo {
  position:absolute;
  bottom:14px;
  right:14px;
  width:70px;
  opacity:0.35;
}
</style>
</head>

<body>

<div id="countdown-box">
  <div id="title">Alaska Cruise Countdown</div>
  <div id="timer"></div>
  <div id="subtext">June 28, 2027</div>

  <img id="logo" src="kamfam-logo.png">
</div>

<script>
const target = new Date("June 28, 2027 00:00:00").getTime();

function update(){
  const now = new Date().getTime();
  const d = target - now;

  const days = Math.floor(d/(1000*60*60*24));
  const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
  const mins = Math.floor((d%(1000*60*60))/(1000*60));
  const secs = Math.floor((d%(1000*60))/1000);

  document.getElementById("timer").innerHTML =
  `${days}d ${hours}h ${mins}m ${secs}s`;
}

update();
setInterval(update,1000);
</script>

</body>
</html>
